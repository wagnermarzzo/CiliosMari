<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salão de Cílios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOPO -->
  <header>
    <button class="btn-adm">ADM</button>
  </header>

  <!-- CAPA -->
  <section class="hero">

    <!-- IMAGEM -->
    <img src="img/1774799502178.png" class="hero-img">

    <!-- BOTÃO + FORM -->
    <div class="overlay">

      <!-- BOTÃO PRINCIPAL -->
      <button class="btn-agendar" id="abrirForm">Agendamento</button>

      <!-- FORM -->
      <form id="form-agendamento" class="form-agendamento">

        <input type="text" id="nome" placeholder="Nome e sobrenome" required>

        <div class="whatsapp-box">
          <span>+55</span>
          <input type="tel" id="whatsapp" placeholder="DDD + número" required>
        </div>

        <input type="date" id="data" required>
        <input type="time" id="hora" required>

        <!-- BOTÃO FINAL (SÓ APARECE NO FORM) -->
        <button type="submit" class="btn-agendar">Agendar</button>

      </form>

    </div>

  </section>

  <script>
    const abrirBtn = document.getElementById('abrirForm');
    const form = document.getElementById('form-agendamento');

    abrirBtn.addEventListener('click', () => {
      form.classList.toggle('active');

      // ESCONDE o botão principal quando abrir
      if (form.classList.contains('active')) {
        abrirBtn.style.display = 'none';
      } else {
        abrirBtn.style.display = 'block';
      }
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const nome = document.getElementById('nome').value;
      const whatsapp = document.getElementById('whatsapp').value;
      const data = document.getElementById('data').value;
      const hora = document.getElementById('hora').value;

      const numero = "5511916181914";

      const mensagem = 
`✨ *Novo Agendamento - Cílios* ✨

👤 Nome: ${nome}
📱 WhatsApp: +55 ${whatsapp}
📅 Data: ${data}
⏰ Horário: ${hora}

💖 Aguardando confirmação!`;

      const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

      window.open(url, '_blank');
    });
  </script>

</body>
</html>
